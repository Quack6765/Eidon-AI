name: Docker Build

on:
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository name
        run: echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Detect deployment-sensitive changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deployment:
              - 'Dockerfile'
              - '.dockerignore'
              - '.github/workflows/docker.yml'
              - '.github/workflows/test.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.*'
              - 'public/**'
              - 'server.cjs'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build full production image (release)
        if: github.event_name == 'release' && github.event.release.target_commitish == 'main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CHROMIUM_PACKAGE
          tags: |
            ghcr.io/${{ env.REPO_LOWERCASE }}:latest
            ghcr.io/${{ env.REPO_LOWERCASE }}:${{ github.event.release.tag_name }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ env.REPO_LOWERCASE }}/buildcache:main
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/${{ env.REPO_LOWERCASE }}/buildcache:main,mode=max

      - name: Build full production image (pull request)
        if: github.event_name == 'pull_request' && steps.changes.outputs.deployment == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            CHROMIUM_PACKAGE
          tags: |
            ghcr.io/${{ env.REPO_LOWERCASE }}:pr
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ env.REPO_LOWERCASE }}/buildcache:main
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/${{ env.REPO_LOWERCASE }}/buildcache:main,mode=max

      - name: Build lightweight builder image
        if: github.event_name == 'pull_request' && steps.changes.outputs.deployment != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: false
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ env.REPO_LOWERCASE }}/buildcache:main
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/${{ env.REPO_LOWERCASE }}/buildcache:main,mode=max

      - name: Smoke test production image
        if: github.event_name == 'pull_request' && steps.changes.outputs.deployment == 'true'
        run: |
          CONTAINER_ID=$(docker run -d \
            -e NODE_ENV=production \
            -e EIDON_DATA_DIR=/app/data \
            -p 3000:3000 \
            ghcr.io/${{ env.REPO_LOWERCASE }}:pr)
          echo "Container started: $CONTAINER_ID"
          # Wait for container to become healthy
          for i in $(seq 1 15); do
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_ID" 2>/dev/null)
            if [ "$HEALTH" = "healthy" ]; then
              echo "Container is healthy"
              docker stop "$CONTAINER_ID" > /dev/null
              exit 0
            fi
            sleep 2
          done
          echo "Container failed to become healthy within 30s"
          docker logs "$CONTAINER_ID"
          docker stop "$CONTAINER_ID" > /dev/null
          exit 1
