version: "3.9"

services:
  eidon:
    build:
      context: .
    image: ghcr.io/${REPO_OWNER:-eidon}/eidon:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - EIDON_DATA_DIR=/app/data
      - EIDON_PASSWORD_LOGIN_ENABLED=true
    volumes:
      - eidon-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode >= 200 && r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  eidon-data:
